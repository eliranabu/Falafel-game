<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0C0820">
<title>Falafel Rush 🧆 — דוכן הפלאפל</title>
<meta name="description" content="Falafel Rush — משחק ארקייד לניהול דוכן פלאפל. הרכיבו פיתות, שמרו על הלקוחות, בנו אימפריה!">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Heebo',sans-serif;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:radial-gradient(120% 70% at 50% -10%,#241640 0%,#140D2A 50%,#080513 100%);
    display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:10px;overflow:hidden;color:#fff}
  #frp{position:relative;width:min(420px,96vw);height:min(820px,94dvh);border-radius:26px;overflow:hidden;color:#fff;user-select:none;
    background:radial-gradient(120% 80% at 50% 0%,#2A1B47 0%,#160F2E 45%,#0C0820 100%);
    box-shadow:0 20px 60px -15px #000,inset 0 1px 0 #ffffff18;display:flex;flex-direction:column}
  .bok{position:absolute;border-radius:50%;filter:blur(14px);opacity:.5;animation:drift 9s ease-in-out infinite}
  @keyframes drift{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
  .glass{background:rgba(255,255,255,.06);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1)}
  button{font-family:'Heebo';cursor:pointer;border:none;transition:transform .08s,filter .15s}
  button:active{transform:scale(.95)}
  .bin:active{transform:scale(.88)}
  @keyframes shk{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}60%{transform:translateX(4px)}}
  @keyframes flash{0%,100%{opacity:1}50%{opacity:.35}}
  @keyframes pop{0%{transform:scale(.4);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
  #queue::-webkit-scrollbar{height:0}
  #over::-webkit-scrollbar{width:5px}#over::-webkit-scrollbar-thumb{background:#ffffff30;border-radius:3px}
  .inner{position:relative;z-index:6;padding:14px;display:flex;flex-direction:column;height:100%}
  #queue{flex:1}
</style>
</head>
<body>
<div id="frp">
  <div class="bok" style="width:130px;height:130px;background:#FFB300;top:-30px;right:-20px"></div>
  <div class="bok" style="width:100px;height:100px;background:#FF5722;top:50px;left:-30px;animation-delay:2s"></div>
  <div class="bok" style="width:80px;height:80px;background:#00E5FF;bottom:140px;right:-15px;animation-delay:4s;opacity:.3"></div>
  <div id="ftint" style="position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle,transparent 40%,#FF5722 130%);opacity:0;transition:opacity .4s;z-index:3"></div>
  <div id="edge" style="position:absolute;inset:0;pointer-events:none;border-radius:26px;box-shadow:inset 0 0 0 0 #FFB300;transition:box-shadow .3s;z-index:5"></div>

  <div class="inner">
    <div class="glass" style="display:flex;align-items:center;gap:8px;padding:11px 13px;border-radius:16px">
      <div style="flex:1;text-align:center"><div style="font-size:10px;color:#FFD27A;font-weight:700">⭐ ניקוד</div><div id="score" style="font-size:18px;font-weight:900">0</div></div>
      <div style="text-align:center;background:rgba(0,0,0,.25);border-radius:13px;padding:4px 12px"><div style="font-size:9px;color:#bbb">⏱️</div><div id="time" style="font-size:17px;font-weight:900">60</div></div>
      <div style="flex:1;text-align:center"><div style="font-size:10px;color:#6BF0A8;font-weight:700">🪙 קופה</div><div id="coins" style="font-size:18px;font-weight:900;color:#6BF0A8">0</div></div>
    </div>

    <div style="margin-top:9px">
      <div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:4px;font-weight:700"><span style="color:#cbb">יעד: <b style="color:#FFD27A" id="goalt">120</b>🪙 · עזבו: <b id="walk" style="color:#FF8A65">0</b></span><span id="stars" style="letter-spacing:3px;font-size:14px">☆☆☆</span></div>
      <div style="height:10px;background:rgba(255,255,255,.08);border-radius:5px;overflow:hidden"><div id="goalbar" style="height:100%;width:0;background:linear-gradient(90deg,#1DB16A,#6BF0A8,#FFD27A);border-radius:5px;transition:width .3s;box-shadow:0 0 8px #6BF0A880"></div></div>
    </div>

    <button id="odbtn" style="margin-top:9px;width:100%;background:rgba(255,87,34,.12);border:1px solid rgba(255,138,101,.4);border-radius:13px;padding:8px;color:#fff;position:relative;overflow:hidden">
      <div id="odfill" style="position:absolute;inset:0;width:0;background:linear-gradient(90deg,#FF8A65,#FF5722);opacity:.4;transition:width .2s"></div>
      <span id="odlabel" style="position:relative;font-size:11px;font-weight:800;color:#FF8A65">🔥 בר אש — 0%</span>
    </button>

    <div id="rush" style="display:none;text-align:center;font-size:11px;font-weight:900;color:#FFD27A;background:rgba(255,87,34,.18);border:1px solid #FF5722;padding:5px;border-radius:11px;margin-top:9px">🔥 שעת עומס! טיפים ×1.5 🔥</div>

    <div style="font-size:10px;color:#cbb;font-weight:700;margin:11px 2px 5px">בחר לקוח · התחל מפיתה והרכב:</div>
    <div id="queue" style="display:flex;gap:9px;overflow-x:auto;padding-bottom:6px;min-height:160px;align-items:flex-start"></div>

    <div class="glass" style="border-radius:18px;padding:10px;margin-top:4px;border-color:rgba(0,229,255,.25)">
      <div id="pita" style="min-height:42px;display:flex;flex-wrap:wrap;gap:5px;justify-content:center;align-items:center;background:rgba(0,0,0,.28);border-radius:13px;padding:8px;transition:transform .12s,box-shadow .2s">
        <span style="font-size:11px;color:#888">בחר לקוח 👆 והרכב פיתה</span>
      </div>
      <div id="bins" style="display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:9px"></div>
    </div>

    <div style="display:flex;gap:9px;margin-top:11px">
      <button id="trash" style="flex:.34;background:linear-gradient(180deg,#FF4D6A,#D81B45);color:#fff;font-size:16px;font-weight:800;padding:14px;border-radius:15px;box-shadow:0 5px 0 #9c0f2e">🗑️</button>
      <button id="serve" style="flex:.66;background:linear-gradient(180deg,#28E08A,#10A862);color:#053d24;font-size:16px;font-weight:900;padding:14px;border-radius:15px;box-shadow:0 5px 0 #0a6e40">🛎️ הגש מנה</button>
    </div>
  </div>

  <div id="combo" style="position:absolute;top:30%;left:0;right:0;text-align:center;font-weight:900;pointer-events:none;opacity:0;z-index:8"></div>
  <div id="msg" style="position:absolute;bottom:88px;left:14px;right:14px;text-align:center;font-size:12px;font-weight:700;pointer-events:none;opacity:0;transition:opacity .3s;z-index:8"></div>
  <div id="over" style="display:none;position:absolute;inset:0;background:rgba(12,8,32,.93);backdrop-filter:blur(6px);flex-direction:column;align-items:center;justify-content:center;gap:9px;text-align:center;padding:22px;z-index:10"></div>
</div>

<script>
(function(){
var R=document.getElementById('frp');
var ING={PITA:{n:'פיתה',e:'🫓',c:'#E5C185'},FALAFEL:{n:'פלאפל',e:'🧆',c:'#A9744F'},SALAD:{n:'סלט',e:'🥗',c:'#5BC46A'},TAHINI:{n:'טחינה',e:'🍶',c:'#EBE3A0'},CHIPS:{n:"צ'יפס",e:'🍟',c:'#FFC94D'},SPICY:{n:'חריף',e:'🌶️',c:'#FF5A5A'}};
var ORDERS=[['PITA','FALAFEL'],['PITA','FALAFEL','TAHINI'],['PITA','FALAFEL','SALAD'],['PITA','FALAFEL','SALAD','TAHINI'],['PITA','FALAFEL','CHIPS','TAHINI'],['PITA','FALAFEL','SALAD','TAHINI','SPICY']];
var TYPES=[
 {t:'סטודנט',av:'🧑‍🎓',ph:'תוסיף סלט אחי 🙏',pat:15,tip:1.0,g:'#5C9DFF'},
 {t:'הייטקיסט',av:'👨‍💻',ph:'מאחר לדיילי! מהר!',pat:9,tip:1.4,g:'#9AA7B3'},
 {t:'תייר',av:'🧳',ph:'Perfect falafel!',pat:19,tip:1.2,g:'#FFC94D'},
 {t:'משפחה',av:'👨‍👩‍👧',ph:'שיספיק לילדים!',pat:14,tip:1.3,g:'#4FD0C0'},
 {t:'מבקר',av:'🧐',ph:'בוחן את הפריכות.',pat:13,tip:1.5,g:'#C9A0DC'},
 {t:'סלב',av:'😎',ph:'שיאו חביבי! פנק!',pat:8,tip:2.0,vip:1,g:'#FFB300'}];
var BASEVAL={2:15,3:20,4:30,5:38};
var UPG=[
 {id:'tip',n:'לקוחות נאמנים',d:'+12% טיפ',e:'💖',base:80,lv:0,max:4},
 {id:'pat',n:'פוסטרים מרגיעים',d:'+12% סבלנות',e:'🧘',base:90,lv:0,max:3},
 {id:'queue',n:'דלפק גדול',d:'+1 מקום',e:'🪑',base:140,lv:0,max:2},
 {id:'od',n:'מצת אש',d:'אש +30% מהר',e:'🔥',base:110,lv:0,max:3}];

var SAVE_KEY='falafel_rush_save';
function loadSave(){try{return JSON.parse(localStorage.getItem(SAVE_KEY))||{}}catch(e){return {}}}
function persist(){try{localStorage.setItem(SAVE_KEY,JSON.stringify({coins:S.coins,day:S.day,best:S.best,cleanStreak:S.cleanStreak,upg:UPG.map(function(u){return u.lv})}))}catch(e){}}

var sv=loadSave();
if(sv.upg)UPG.forEach(function(u,i){u.lv=sv.upg[i]||0});
var S={coins:sv.coins||0,score:0,combo:0,time:60,rush:0,pita:[],custs:[],running:1,nid:0,day:sv.day||1,sel:null,goal:120,earnedToday:0,best:sv.best||0,walkToday:0,od:0,odActive:0,odTime:0,cleanStreak:sv.cleanStreak||0};
S.goal=Math.round(120*Math.pow(1.15,S.day-1));
var $=function(i){return document.getElementById(i)};
function up(id){return UPG.filter(function(u){return u.id===id})[0].lv}

var AC=null;function ac(){if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}return AC}
function beep(f,d,t,g){var c=ac();if(!c)return;var o=c.createOscillator(),v=c.createGain();o.type=t||'sine';o.frequency.value=f;v.gain.value=g||.1;o.connect(v);v.connect(c.destination);var tt=c.currentTime;v.gain.setValueAtTime(g||.1,tt);v.gain.exponentialRampToValueAtTime(.001,tt+d);o.start(tt);o.stop(tt+d)}
function sCoin(){beep(1318,.1);setTimeout(function(){beep(1760,.13)},70)}
function sPlop(){beep(220,.08,'sine',.13)}
function sServe(cb){var n=[523,659,784,1046],sh=Math.min(cb*45,500);n.forEach(function(f,i){setTimeout(function(){beep(f+sh,.15)},i*52)})}
function sBuzz(){beep(110,.25,'square',.09)}
function sStar(){[784,988,1318,1568].forEach(function(f,i){setTimeout(function(){beep(f,.2)},i*110)})}
function sOD(){[660,880,660,880,1100].forEach(function(f,i){setTimeout(function(){beep(f,.12,'square',.08)},i*70)})}

function msg(t,col){var m=$('msg');m.textContent=t;m.style.color=col||'#fff';m.style.opacity=1;clearTimeout(m._t);m._t=setTimeout(function(){m.style.opacity=0},1500)}
function comboMult(){return 1+Math.min(S.combo,10)*0.1}
function maxQ(){return 4+up('queue')}

function spawn(){
 if(S.custs.length>=maxQ()||!S.running)return;
 var ty=TYPES[Math.floor(Math.random()*TYPES.length)],ord=ORDERS[Math.floor(Math.random()*ORDERS.length)];
 var dayMod=Math.max(.7,1-.03*(S.day-1)),patUp=1+up('pat')*.12;
 S.custs.push({id:++S.nid,ty:ty,ord:ord.slice(),pat:1,max:ty.pat*dayMod*patUp,leaving:0});
 if(S.sel===null)S.sel=S.custs[0].id;
 render();
}

function bins(){
 var b=$('bins');b.innerHTML='';var hasPita=S.pita.indexOf('PITA')>=0;
 Object.keys(ING).forEach(function(k){
  var allow=(k==='PITA'||hasPita)&&S.sel;
  var el=document.createElement('button');el.className='bin';
  el.style.cssText='background:'+(allow?'linear-gradient(180deg,#2C2742,#211C36)':'rgba(255,255,255,.04)')+';border:1.5px solid '+(allow?ING[k].c+'88':'rgba(255,255,255,.08)')+';border-radius:13px;padding:9px 2px;color:#fff;opacity:'+(allow?1:.4)+';box-shadow:'+(allow?'0 3px 0 '+ING[k].c+'33,0 0 14px '+ING[k].c+'22':'none');
  el.innerHTML='<div style="font-size:22px;filter:drop-shadow(0 2px 3px #0008)">'+ING[k].e+'</div><div style="font-size:9px;font-weight:800;margin-top:2px">'+ING[k].n+'</div>';
  el.onclick=function(){
   if(!S.running||!S.sel){msg('בחר לקוח קודם 👆','#FFC94D');return}
   if(k!=='PITA'&&S.pita.indexOf('PITA')<0){msg('התחל מפיתה 🫓','#FFC94D');return}
   S.pita.push(k);sPlop();var pp=$('pita');pp.style.transform='scale(1.06)';pp.style.boxShadow='0 0 0 2px #FFD27A,0 0 20px #FFD27A66';setTimeout(function(){pp.style.transform='';pp.style.boxShadow=''},190);render();
  };
  b.appendChild(el);
 });
}

function render(){
 var q=$('queue');q.innerHTML='';
 S.custs.forEach(function(c){
  var sel=c.id===S.sel,pcol=c.pat>.6?'#28E08A':c.pat>.3?'#FFC94D':'#FF5A5A',panic=c.pat<=.2&&!S.odActive;
  var face=c.leaving===1?'😍':c.leaving===2?'😡':c.pat>.5?c.ty.av:c.pat>.25?'😐':'😣';
  var card=document.createElement('div');
  card.style.cssText='flex:0 0 134px;display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:transform .5s,opacity .5s;'+(c.leaving===1?'transform:translateY(-180px);opacity:0;':c.leaving===2?'transform:translateX(460px) rotate(8deg);opacity:0;':sel?'transform:translateY(-6px) scale(1.03);':'');
  if(panic&&!c.leaving)card.style.animation='shk .3s infinite';
  card.innerHTML=
   '<div style="background:#fff;color:#2a2a2a;border-radius:13px;padding:7px 8px;font-size:10px;text-align:center;font-weight:700;min-height:34px;box-shadow:0 4px 10px #0005;border:2px solid '+(sel?'#FFD27A':c.ty.vip?'#FFB300':'transparent')+'">'+(c.leaving===2?'😡 לא מחכה!':'"'+c.ty.ph+'"')+
   '<div style="margin-top:4px">'+c.ord.map(function(k){return '<span style="display:inline-block;width:19px;height:19px;line-height:19px;border-radius:50%;background:'+ING[k].c+'2e;border:1.5px solid '+ING[k].c+';font-size:9px;margin:0 1px">'+ING[k].e+'</span>'}).join('')+'</div></div>'+
   '<div style="position:relative;width:66px;height:66px;border-radius:50%;margin:9px 0 5px;display:flex;align-items:center;justify-content:center;font-size:34px;background:radial-gradient(circle at 50% 35%,'+c.ty.g+'cc,'+c.ty.g+'33);box-shadow:0 0 18px '+(sel?c.ty.g+'aa':c.ty.g+'44')+',inset 0 -4px 8px #0004;border:2px solid '+(sel?'#FFD27A':c.ty.g+'88')+'">'+face+(c.ty.vip?'<span style="position:absolute;top:-15px;font-size:17px">👑</span>':'')+'</div>'+
   '<div class="glass" style="width:100%;border-radius:12px;padding:6px 8px;border-color:'+(sel?'#FFD27A':'rgba(255,255,255,.1)')+'">'+
   '<div style="font-size:10px;font-weight:800;color:'+(c.ty.vip?'#FFD27A':'#fff')+';text-align:center">'+c.ty.t+'</div>'+
   '<div style="height:7px;background:rgba(255,255,255,.12);border-radius:4px;margin-top:5px;overflow:hidden"><div style="height:100%;width:'+(c.pat*100)+'%;background:'+pcol+';border-radius:4px;box-shadow:0 0 6px '+pcol+';'+(panic?'animation:flash .25s infinite':'')+'"></div></div></div>';
  card.onclick=function(){if(!c.leaving){S.sel=c.id;render()}};
  q.appendChild(card);
 });
 var p=$('pita');
 if(!S.pita.length){p.innerHTML='<span style="font-size:11px;color:#888">'+(S.sel?'הרכב פיתה 👇':'בחר לקוח 👆')+'</span>'}
 else{p.innerHTML=S.pita.map(function(k){return '<span style="background:'+ING[k].c+';color:#2a2a2a;border-radius:9px;padding:5px 9px;font-size:12px;font-weight:800;box-shadow:0 2px 5px #0004;animation:pop .25s">'+ING[k].e+' '+ING[k].n+'</span>'}).join('')}
 bins();
 $('coins').textContent=S.coins;$('score').textContent=S.score;$('time').textContent=Math.ceil(S.time);
 $('goalt').textContent=S.goal;$('walk').textContent=S.walkToday;
 $('goalbar').style.width=Math.min(100,S.earnedToday/S.goal*100)+'%';
 $('stars').textContent=S.earnedToday>=S.goal*2?'★★★':S.earnedToday>=S.goal*1.4?'★★☆':S.earnedToday>=S.goal?'★☆☆':'☆☆☆';
 $('rush').style.display=S.rush>0?'block':'none';
 var of=$('odfill'),ol=$('odlabel');
 if(S.odActive){of.style.width='100%';ol.textContent='🔥 אש פעילה! '+S.odTime.toFixed(1)+'ש';ol.style.color='#FFD27A'}
 else if(S.od>=1){of.style.width='100%';ol.textContent='🔥 לחץ להפעלת אש!';ol.style.color='#FFD27A'}
 else{of.style.width=(S.od*100)+'%';ol.textContent='🔥 בר אש — '+Math.round(S.od*100)+'%';ol.style.color='#FF8A65'}
 $('ftint').style.opacity=S.odActive?1:0;
}

function burst(n,emo){
 var tgt=$('coins').getBoundingClientRect(),rr=R.getBoundingClientRect();
 for(var i=0;i<Math.min(n,12);i++){(function(i){
  var c=document.createElement('div');c.textContent=emo||'🪙';
  c.style.cssText='position:absolute;font-size:'+(14+Math.random()*8)+'px;z-index:9;pointer-events:none;left:'+(60+Math.random()*270)+'px;top:'+(58+Math.random()*30)+'%;transition:all .65s cubic-bezier(.3,0,.2,1)';
  R.appendChild(c);
  requestAnimationFrame(function(){c.style.left=(tgt.left-rr.left+10)+'px';c.style.top=(tgt.top-rr.top)+'px';c.style.opacity=0;c.style.transform='scale(.4)'});
  setTimeout(function(){c.remove()},680);
 })(i)}
 var cc=$('coins');cc.style.transition='transform .15s';cc.style.transform='scale(1.6)';setTimeout(function(){cc.style.transform=''},150);
}
function showCombo(){
 if(S.combo<2)return;var c=$('combo');
 var col=S.combo>=10?'#C94DFF':S.combo>=5?'#FF4D6A':'#FFB300';
 c.innerHTML='<span style="display:inline-block;background:'+col+';color:#fff;padding:8px 20px;border-radius:16px;font-size:'+(18+Math.min(S.combo,13))+'px;box-shadow:0 0 24px '+col+'cc">קומבו ×'+S.combo+' 🔥 '+comboMult().toFixed(1)+'×</span>';
 c.style.opacity=1;c.style.animation='none';void c.offsetWidth;c.style.animation='pop .3s';setTimeout(function(){c.style.opacity=0},550);
 var e=$('edge'),lvl=S.combo>=10?'#C94DFF':S.combo>=5?'#FF4D6A':S.combo>=3?'#FFB300':null;
 if(lvl){e.style.boxShadow='inset 0 0 0 5px '+lvl+',inset 0 0 30px '+lvl+'66';setTimeout(function(){e.style.boxShadow='inset 0 0 0 0 '+lvl},420)}
}

$('odbtn').onclick=function(){if(S.od>=1&&!S.odActive&&S.running){S.odActive=1;S.odTime=5;S.od=0;sOD();burst(8,'🔥');msg('🔥 מצב אש! סבלנות קפואה, כפל כפול!','#FFD27A')}};

function doServe(){
 if(!S.running||!S.sel){msg('בחר לקוח 👆','#FFC94D');return}
 var c=S.custs.filter(function(x){return x.id===S.sel&&!x.leaving})[0];
 if(!c){msg('בחר לקוח 👆','#FFC94D');return}
 var need={},got={};c.ord.forEach(function(k){need[k]=(need[k]||0)+1});S.pita.forEach(function(k){got[k]=(got[k]||0)+1});
 var ok=Object.keys(need).length===Object.keys(got).length&&Object.keys(need).every(function(k){return need[k]===got[k]});
 if(ok){
  var amt=Math.round(((BASEVAL[c.ord.length]||20)+(c.ty.vip?20:0))*c.ty.tip*(1+up('tip')*.12)*comboMult()*(S.rush>0?1.5:1)*(S.odActive?2:1));
  S.coins+=amt;S.earnedToday+=amt;S.combo++;S.score+=amt*10+55+S.combo*20;
  S.od=Math.min(1,S.od+(0.12+0.04*Math.min(S.combo,8))*(1+up('od')*.3));
  sServe(S.combo);sCoin();burst(Math.ceil(amt/8));showCombo();
  c.leaving=1;render();
  var fid=c.id;setTimeout(function(){S.custs=S.custs.filter(function(x){return x.id!==fid});if(S.custs.length)S.sel=S.custs[0].id;else{S.sel=null;spawn()}render()},520);
  msg('מושלם! +'+amt+' 🪙'+(S.odActive?' 🔥':''),'#28E08A');
 }else{sBuzz();S.combo=0;S.score=Math.max(0,S.score-12);var pp=$('pita');pp.style.animation='shk .3s';setTimeout(function(){pp.style.animation=''},300);msg('זה לא מה שהזמין! ❌','#FF5A5A')}
 S.pita=[];render();
}
$('serve').onclick=doServe;
$('trash').onclick=function(){if(!S.pita.length)return;S.pita=[];sBuzz();render();msg('נזרק לפח 🗑️','#FFC94D')};

var last=Date.now();
function loop(){
 if(!S.running)return;var now=Date.now(),dt=Math.min(.1,(now-last)/1000);last=now;S.time-=dt;
 if(S.odActive){S.odTime-=dt;if(S.odTime<=0){S.odActive=0;msg('מצב אש נגמר','#FF8A65')}}
 S.rush=(S.time<45&&S.time>37)||(S.time<18&&S.time>11)?1:0;
 if(!S.odActive)S.custs.forEach(function(c){if(!c.leaving)c.pat-=dt/c.max});
 var left=S.custs.filter(function(c){return c.pat<=0&&!c.leaving});
 if(left.length){left.forEach(function(c){c.leaving=2});S.combo=0;S.walkToday++;sBuzz();
  S.custs.forEach(function(c){if(!c.leaving)c.pat=Math.max(0.05,c.pat-0.18)});
  msg('לקוח עזב! 😡 כל התור התעצבן!','#FF5A5A');render();
  setTimeout(function(){var ids=left.map(function(x){return x.id});S.custs=S.custs.filter(function(x){return ids.indexOf(x.id)<0});if(S.sel&&!S.custs.filter(function(x){return x.id===S.sel}).length)S.sel=S.custs.length?S.custs[0].id:null;render()},480)}
 if(Math.random()<(S.rush?0.032:0.015)*dt*60)spawn();
 render();
 if(S.time<=0){endDay();return}
 requestAnimationFrame(loop);
}

function endDay(){
 S.running=0;S.odActive=0;
 var perfect=S.walkToday===0;
 if(perfect){var bonus=Math.round(S.earnedToday*0.5);S.earnedToday+=bonus;S.coins+=bonus;S.cleanStreak++}else S.cleanStreak=0;
 var stars=S.earnedToday>=S.goal*2?3:S.earnedToday>=S.goal*1.4?2:S.earnedToday>=S.goal?1:0,win=stars>=1;
 if(S.score>S.best)S.best=S.score;if(win)sStar();else sBuzz();
 persist();
 var o=$('over');o.style.display='flex';
 var shop=UPG.map(function(u){var cost=Math.round(u.base*Math.pow(1.6,u.lv)),maxed=u.lv>=u.max,can=S.coins>=cost&&!maxed;
  return '<button class="upbtn" data-id="'+u.id+'" '+(can?'':'disabled')+' style="display:flex;align-items:center;gap:9px;width:100%;background:'+(can?'rgba(0,229,255,.08)':'rgba(255,255,255,.04)')+';border:1px solid '+(can?'#00E5FF55':'rgba(255,255,255,.08)')+';border-radius:12px;padding:10px;color:#fff;text-align:right;opacity:'+(maxed?.5:1)+'">'+
  '<span style="font-size:22px">'+u.e+'</span><span style="flex:1"><div style="font-size:12px;font-weight:800">'+u.n+' <span style="color:#888;font-size:10px">Lv'+u.lv+'/'+u.max+'</span></div><div style="font-size:10px;color:#aaa">'+u.d+'</div></span>'+
  '<span style="font-size:12px;font-weight:800;color:'+(maxed?'#FFD27A':can?'#28E08A':'#FF5A5A')+'">'+(maxed?'מקס':cost+'🪙')+'</span></button>';
 }).join('');
 o.innerHTML='<div style="font-size:44px;animation:pop .4s">'+(win?(perfect?'🌟':'🎉'):'😞')+'</div>'+
  '<div style="font-size:20px;font-weight:900">'+(win?'יום '+S.day+(perfect?' מושלם!':' הושלם!'):'לא הגעת ליעד')+'</div>'+
  '<div style="font-size:30px;letter-spacing:5px;color:#FFD27A">'+'★'.repeat(stars)+'☆'.repeat(3-stars)+'</div>'+
  (perfect?'<div style="font-size:11px;color:#FFD27A;font-weight:700">✨ יום נקי! בונוס +50% · רצף נקי: '+S.cleanStreak+'</div>':'<div style="font-size:11px;color:#FF8A65">'+S.walkToday+' לקוחות עזבו</div>')+
  '<div style="font-size:13px;color:#28E08A;font-weight:700">היום '+S.earnedToday+' 🪙 · קופה '+S.coins+'</div>'+
  '<div style="font-size:11px;color:#bbb">ניקוד '+S.score+' · שיא '+S.best+'</div>'+
  '<div style="width:100%;max-height:160px;overflow-y:auto;display:flex;flex-direction:column;gap:7px;margin:4px 0"><div style="font-size:11px;color:#FFD27A;font-weight:800">🛠️ חנות שדרוגים</div>'+shop+'</div>'+
  '<button id="again" style="background:linear-gradient(180deg,'+(win?'#28E08A,#10A862':'#3FC9FF,#1E9BD8')+');color:#053d24;font-size:16px;font-weight:900;padding:13px 28px;border-radius:14px;box-shadow:0 5px 0 '+(win?'#0a6e40':'#15688f')+'">'+(win?'יום '+(S.day+1)+' ▶️':'נסה שוב 🔄')+'</button>';
 o.querySelectorAll('.upbtn').forEach(function(btn){btn.onclick=function(){var u=UPG.filter(function(x){return x.id===btn.dataset.id})[0],cost=Math.round(u.base*Math.pow(1.6,u.lv));if(S.coins>=cost&&u.lv<u.max){S.coins-=cost;u.lv++;sCoin();persist();endDay()}}});
 $('again').onclick=function(){if(win)S.day++;S.earnedToday=0;S.score=0;S.time=60;S.combo=0;S.pita=[];S.custs=[];S.sel=null;S.running=1;S.walkToday=0;S.od=0;S.odActive=0;S.goal=Math.round(120*Math.pow(1.15,S.day-1));persist();o.style.display='none';spawn();spawn();last=Date.now();loop()};
}

spawn();spawn();render();loop();
})();
</script>
</body>
</html>
